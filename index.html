<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chisel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0033FF">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

/* ========== Theme ========== */
[data-theme="light"] {
  --bg: #fdfcfa;
  --text: #2c2c2c;
  --text-secondary: #777;
  --text-muted: #bbb;
  --border: rgba(0,0,0,0.06);
  --bar-bg: rgba(255,255,255,0.92);
  --bar-shadow: 0 4px 32px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.03);
  --bar-border: rgba(0,0,0,0.06);
  --btn-hover: rgba(0,0,0,0.05);
  --btn-active: rgba(0,0,0,0.1);
  --divider: rgba(0,0,0,0.06);
  --input-bg: #fafaf8;
  --input-border: rgba(0,0,0,0.08);
  --input-focus: rgba(0,51,255,0.3);
  --accent: #0033FF;
  --selection-border: rgba(0,51,255,0.4);
  --hover-bg: rgba(0,51,255,0.03);
  --drop-line: #0033FF;
  --swatch-border: rgba(0,0,0,0.12);
  --danger: #cc4444;
  --tooltip-bg: rgba(0,0,0,0.75);
  --tooltip-text: #fff;
  --resize-handle: rgba(0,51,255,0.6);
  --modal-overlay: rgba(253,252,250,0.85);
  --modal-bg: #fff;
  --modal-shadow: 0 8px 48px rgba(0,0,0,0.08);
}

[data-theme="dark"] {
  --bg: #1a1a1a;
  --text: #e0e0e0;
  --text-secondary: #999;
  --text-muted: #555;
  --border: rgba(255,255,255,0.06);
  --bar-bg: rgba(40,40,40,0.92);
  --bar-shadow: 0 4px 32px rgba(0,0,0,0.3);
  --bar-border: rgba(255,255,255,0.08);
  --btn-hover: rgba(255,255,255,0.08);
  --btn-active: rgba(255,255,255,0.15);
  --divider: rgba(255,255,255,0.08);
  --input-bg: #333;
  --input-border: rgba(255,255,255,0.1);
  --input-focus: rgba(77,122,255,0.4);
  --accent: #4d7aff;
  --selection-border: rgba(77,122,255,0.5);
  --hover-bg: rgba(77,122,255,0.05);
  --drop-line: #4d7aff;
  --swatch-border: rgba(255,255,255,0.15);
  --danger: #e05555;
  --tooltip-bg: rgba(255,255,255,0.85);
  --tooltip-text: #1a1a1a;
  --resize-handle: rgba(77,122,255,0.7);
  --modal-overlay: rgba(26,26,26,0.85);
  --modal-bg: #2a2a2a;
  --modal-shadow: 0 8px 48px rgba(0,0,0,0.3);
}

/* ========== Reset ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ========== Install banner ========== */
.install-banner {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px 10px 20px;
  background: var(--bar-bg); backdrop-filter: blur(16px);
  border: 1px solid var(--bar-border); border-radius: 12px;
  box-shadow: var(--bar-shadow); z-index: 300;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  white-space: nowrap;
}
.install-banner.show { transform: translateX(-50%) translateY(0); }
.install-banner p { font-size: 13px; font-weight: 300; color: var(--text-secondary); }
.install-btn {
  padding: 7px 18px; border: none; border-radius: 8px;
  background: var(--accent); color: #fff; font-size: 12px;
  cursor: pointer; transition: opacity 0.15s;
}
.install-btn:hover { opacity: 0.85; }
.install-dismiss {
  width: 24px; height: 24px; border: none; border-radius: 6px;
  background: transparent; color: var(--text-muted); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.install-dismiss:hover { background: var(--btn-hover); }
.install-dismiss svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

/* ========== Canvas ========== */
.canvas { width: 100%; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
#canvas-iframe { width: 100%; height: 100%; border: none; background: #fff; }

/* ========== Empty state ========== */
.empty-state {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px; z-index: 5;
}
.empty-state.hidden { display: none; }
.empty-ring {
  width: 120px; height: 120px; border-radius: 50%;
  border: 1px solid var(--border); display: flex;
  align-items: center; justify-content: center; position: relative;
}
.empty-ring::after {
  content: ''; position: absolute; width: 80px; height: 80px;
  border-radius: 50%; border: 1px dashed var(--divider);
}
.empty-ring svg { width: 24px; height: 24px; stroke: var(--text-muted); fill: none; stroke-width: 1.2; z-index: 1; }
.empty-text { font-size: 16px; font-weight: 300; color: var(--text-muted); }
.empty-sub { font-size: 13px; color: var(--text-muted); opacity: 0.6; }
.empty-btn {
  margin-top: 12px; padding: 12px 36px; border: none; border-radius: 12px;
  background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
  transition: all 0.2s;
}
.empty-btn:hover { opacity: 0.85; box-shadow: 0 4px 16px rgba(0,51,255,0.2); }

/* ========== Toolbar ========== */
.toolbar {
  position: fixed;
  display: flex; align-items: center; gap: 2px; padding: 6px;
  background: var(--bar-bg); backdrop-filter: blur(16px);
  border: 1px solid var(--bar-border); border-radius: 14px;
  box-shadow: var(--bar-shadow); z-index: 100;
  user-select: none;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}
.toolbar.hidden { display: none; }

/* Bottom mode (default) */
.toolbar.mode-bottom {
  bottom: 24px; left: 50%; transform: translateX(-50%);
  flex-direction: row;
}

/* Left mode */
.toolbar.mode-left {
  left: 16px; top: 50%; transform: translateY(-50%);
  flex-direction: column;
}

.toolbar.mode-left .bb-divider {
  width: 22px; height: 1px; margin: 4px 0;
}

.toolbar.mode-left .font-size-group {
  flex-direction: column;
}

.toolbar.mode-left .ctx-group.show {
  flex-direction: column;
}

.bb {
  display: inline-flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border: none; border-radius: 10px;
  background: transparent; color: var(--text-secondary); cursor: pointer;
  transition: all 0.15s; position: relative;
}
.bb:hover { background: var(--btn-hover); color: var(--text); }
.bb:disabled { opacity: 0.2; cursor: default; }
.bb:disabled:hover { background: transparent; color: var(--text-secondary); }
.bb svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.bb-divider { width: 1px; height: 22px; background: var(--divider); margin: 0 4px; }

/* Color swatches in bar */
.bb-color {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent;
  cursor: pointer; transition: all 0.15s; margin: 0 2px;
}
.bb-color:hover { transform: scale(1.2); }
.bc-black { background: #000; border-color: var(--swatch-border); }
.bc-white { background: #fff; border-color: var(--swatch-border); }
.bc-blue { background: #0033FF; border-color: transparent; }

/* Font size in bar */
.font-size-group { display: flex; align-items: center; gap: 1px; }
.font-size-display {
  font-size: 12px; font-weight: 400; color: var(--text-secondary);
  min-width: 32px; text-align: center; font-variant-numeric: tabular-nums; user-select: none;
}
.bb.sm { width: 30px; height: 30px; }
.bb.sm svg { width: 14px; height: 14px; }

/* Context section — only visible when element selected */
.ctx-group {
  display: none;
  align-items: center;
  gap: 2px;
}
.ctx-group.show { display: flex; }

/* ========== Tooltip ========== */
.tooltip {
  position: fixed; padding: 6px 14px;
  background: var(--tooltip-bg); color: var(--tooltip-text);
  border-radius: 8px; font-size: 12px; font-weight: 300;
  pointer-events: none; z-index: 300; opacity: 0;
  transform: translateY(4px); transition: all 0.25s; white-space: nowrap;
}
.tooltip.visible { opacity: 1; transform: translateY(0); }

/* ========== File input ========== */
#file-input { display: none; }

/* ========== Resize handles ========== */
.resize-handle {
  position: fixed; width: 8px; height: 8px; background: var(--resize-handle);
  border: 1px solid #fff; border-radius: 2px; z-index: 50;
  pointer-events: auto;
}
.resize-handle.nw { cursor: nwse-resize; }
.resize-handle.n  { cursor: ns-resize; }
.resize-handle.ne { cursor: nesw-resize; }
.resize-handle.e  { cursor: ew-resize; }
.resize-handle.se { cursor: nwse-resize; }
.resize-handle.s  { cursor: ns-resize; }
.resize-handle.sw { cursor: nesw-resize; }
.resize-handle.w  { cursor: ew-resize; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 2px; }
</style>
</head>
<body>
<input type="file" id="file-input" accept=".html,.htm">

<!-- Install banner -->
<div class="install-banner" id="install-banner">
  <p data-i18n="installHint">Use offline as an app</p>
  <button class="install-btn" id="install-btn" data-i18n="install">Install</button>
  <button class="install-dismiss" id="install-dismiss"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>

<!-- Canvas -->
<div class="canvas" id="canvas-area">
  <iframe id="canvas-iframe"></iframe>
  <div class="empty-state" id="empty-state">
    <div class="empty-ring"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
    <p class="empty-text" data-i18n="emptyTitle">Begin with a file</p>
    <p class="empty-sub" data-i18n="emptyHint">Drop it anywhere, or</p>
    <button class="empty-btn" id="btn-empty-open" data-i18n="open">Open</button>
  </div>
</div>

<!-- Bottom bar -->
<div class="toolbar mode-bottom hidden" id="toolbar">
  <!-- Layout toggle -->
  <button class="bb" id="btn-layout" title="Toggle layout"><svg viewBox="0 0 24 24" id="layout-icon"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/></svg></button>
  <div class="bb-divider"></div>
  <!-- File ops -->
  <button class="bb" id="btn-open" title="Open"><svg viewBox="0 0 24 24"><path d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2L5 19z"/></svg></button>
  <button class="bb" id="btn-save" title="Save"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></button>
  <button class="bb" id="btn-pdf" title="Export PDF" style="width:auto;padding:0 10px;font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--text-secondary);">PDF</button>
  <div class="bb-divider"></div>
  <button class="bb" id="btn-undo" disabled><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></button>
  <button class="bb" id="btn-redo" disabled><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg></button>

  <!-- Context: shown when element selected -->
  <div class="ctx-group" id="ctx-tools">
    <div class="bb-divider"></div>
    <!-- Colors -->
    <div class="bb-color bc-black" data-color="#000000"></div>
    <div class="bb-color bc-white" data-color="#FFFFFF"></div>
    <div class="bb-color bc-blue" data-color="#0033FF"></div>
    <div class="bb-divider"></div>
    <!-- Font size -->
    <div class="font-size-group">
      <button class="bb sm" id="btn-font-down"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <span class="font-size-display" id="font-size-display">--</span>
      <button class="bb sm" id="btn-font-up"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
    <div class="bb-divider"></div>
    <!-- Copy / Delete -->
    <button class="bb" id="btn-copy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
    <button class="bb" id="btn-delete"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
  </div>

  <div class="bb-divider"></div>
  <button class="bb" id="btn-theme"><svg viewBox="0 0 24 24" id="theme-icon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
  <button class="bb" id="btn-lang"><span id="lang-label" style="font-size:11px;font-weight:500;letter-spacing:0.5px;">EN</span></button>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
(function() {
  'use strict';

  // ========== i18n ==========
  var T = {
    en: {
      emptyTitle: 'Begin with a file', emptyHint: 'Drop it anywhere, or',
      open: 'Open', installHint: 'Use offline as an app', install: 'Install',
      hintSelect: 'Click to select and edit',
    },
    zh: {
      emptyTitle: '\u5F00\u59CB\u7F16\u8F91', emptyHint: '\u62D6\u653E\u6587\u4EF6\u5230\u6B64\u5904\uFF0C\u6216',
      open: '\u6253\u5F00', installHint: '\u79BB\u7EBF\u4F7F\u7528', install: '\u5B89\u88C5',
      hintSelect: '\u70B9\u51FB\u9009\u62E9\u5E76\u7F16\u8F91',
    }
  };
  var lang = localStorage.getItem('chisel-lang') || 'en';
  function setLang(l) {
    lang = l; localStorage.setItem('chisel-lang', l);
    document.getElementById('lang-label').textContent = l.toUpperCase();
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var k = el.getAttribute('data-i18n'); if (T[l][k]) el.textContent = T[l][k];
    });
  }

  // ========== Theme ==========
  var theme = localStorage.getItem('chisel-theme') || 'light';
  function setTheme(t) {
    theme = t; localStorage.setItem('chisel-theme', t);
    document.documentElement.setAttribute('data-theme', t);
    var icon = document.getElementById('theme-icon');
    icon.innerHTML = t === 'dark'
      ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
      : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  }

  // ========== PWA Install ==========
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault(); deferredPrompt = e;
    if (!localStorage.getItem('chisel-install-dismissed'))
      document.getElementById('install-banner').classList.add('show');
  });
  document.getElementById('install-btn').addEventListener('click', function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() { deferredPrompt = null; document.getElementById('install-banner').classList.remove('show'); });
  });
  document.getElementById('install-dismiss').addEventListener('click', function() {
    document.getElementById('install-banner').classList.remove('show');
    localStorage.setItem('chisel-install-dismissed', '1');
  });

  // ========== State ==========
  var fileLoaded = false;
  var selectedElement = null;
  var editingText = false;
  var editorIdCounter = 0;
  var undoStack = [], redoStack = [];
  var PROTECTED = new Set(['HTML', 'HEAD', 'BODY', 'SCRIPT', 'STYLE', 'LINK', 'META']);

  // ========== DOM ==========
  var fileInput = document.getElementById('file-input');
  var iframe = document.getElementById('canvas-iframe');
  var emptyState = document.getElementById('empty-state');
  var toolbar = document.getElementById('toolbar');
  var ctxTools = document.getElementById('ctx-tools');
  var fontSizeDisplay = document.getElementById('font-size-display');
  var tooltipEl = document.getElementById('tooltip');

  function getDoc() { return iframe.contentDocument; }
  function getWin() { return iframe.contentWindow; }
  function isSvg(el) { return el && el.namespaceURI === 'http://www.w3.org/2000/svg'; }

  // ========== Editor IDs ==========
  function assignIds(root) {
    if (root.nodeType === 1) {
      if (!root.getAttribute('data-eid')) root.setAttribute('data-eid', 'e' + (++editorIdCounter));
      for (var i = 0; i < root.children.length; i++) assignIds(root.children[i]);
    }
  }

  // ========== Undo/Redo ==========
  function exec(cmd) { cmd.execute(); undoStack.push(cmd); redoStack.length = 0; updateUndoRedo(); }
  function undo() {
    if (!undoStack.length) return;
    var c = undoStack.pop(); c.undo(); redoStack.push(c); updateUndoRedo();
    if (selectedElement && !getDoc().contains(selectedElement)) deselect();
    else refreshCtx();
  }
  function redo() {
    if (!redoStack.length) return;
    var c = redoStack.pop(); c.execute(); undoStack.push(c); updateUndoRedo();
    if (selectedElement && !getDoc().contains(selectedElement)) deselect();
    else refreshCtx();
  }
  function updateUndoRedo() {
    document.getElementById('btn-undo').disabled = !undoStack.length;
    document.getElementById('btn-redo').disabled = !redoStack.length;
  }

  // ========== Commands ==========
  function cmdSnapshot(el) {
    // Capture full innerHTML for undo of contentEditable changes
    var old = el.innerHTML;
    return {
      _new: null,
      seal: function() { this._new = el.innerHTML; },
      execute: function() { if (this._new !== null) el.innerHTML = this._new; },
      undo: function() { el.innerHTML = old; }
    };
  }

  function cmdColor(el, prop, oldV, newV) {
    return {
      execute: function() {
        if (prop === 'fill' || prop === 'stroke') el.setAttribute(prop, newV);
        else el.style[prop] = newV;
      },
      undo: function() {
        if (prop === 'fill' || prop === 'stroke') { if (oldV) el.setAttribute(prop, oldV); else el.removeAttribute(prop); }
        else el.style[prop] = oldV;
      }
    };
  }

  function cmdFontSize(el, oldV, newV) {
    return {
      execute: function() { el.style.fontSize = newV + 'px'; },
      undo: function() { el.style.fontSize = oldV || ''; }
    };
  }

  function cmdDelete(el) {
    var p = el.parentNode, next = el.nextSibling;
    return { execute: function() { p.removeChild(el); }, undo: function() { p.insertBefore(el, next); } };
  }

  function cmdCopy(el) {
    var clone = null;
    return {
      execute: function() { clone = el.cloneNode(true); assignIds(clone); setupElement(clone); el.parentNode.insertBefore(clone, el.nextSibling); },
      undo: function() { if (clone && clone.parentNode) clone.parentNode.removeChild(clone); }
    };
  }

  function cmdMove(el, oldParent, oldNext, newParent, newNext) {
    return {
      execute: function() { newParent.insertBefore(el, newNext); },
      undo: function() { oldParent.insertBefore(el, oldNext); }
    };
  }

  function cmdResize(el, attr, oldV, newV) {
    return {
      execute: function() { el.setAttribute(attr, newV); },
      undo: function() { el.setAttribute(attr, oldV); }
    };
  }

  // ========== Helpers ==========
  function rgbToHex(rgb) {
    if (!rgb) return '#000000'; if (rgb.startsWith('#')) return rgb;
    var m = rgb.match(/\d+/g); if (!m || m.length < 3) return '#000000';
    return '#' + m.slice(0,3).map(function(n){ var h=parseInt(n).toString(16); return h.length===1?'0'+h:h; }).join('');
  }

  function getFontSize(el) {
    try { return Math.round(parseFloat(getWin().getComputedStyle(el).fontSize)); }
    catch(e) { return 16; }
  }

  // ========== Selection ==========
  // Contrasting selection: double outline (white inner + dark outer) visible on any bg
  function applySelectionStyle(el) {
    el.style.outline = '2px dashed rgba(0,0,0,0.5)';
    el.style.outlineOffset = '3px';
    el.style.boxShadow = '0 0 0 5px rgba(255,255,255,0.6), 0 0 0 7px rgba(0,0,0,0.3)';
  }

  function clearSelectionStyle(el) {
    el.style.outline = '';
    el.style.outlineOffset = '';
    el.style.boxShadow = '';
  }

  function selectEl(el) {
    if (!el || el.nodeType !== 1 || PROTECTED.has(el.tagName)) return;
    if (editingText) exitTextEdit();
    if (selectedElement && selectedElement !== el) clearSelectionStyle(selectedElement);
    selectedElement = el;

    applySelectionStyle(el);

    // Show context tools (hide color for complex SVGs)
    ctxTools.classList.add('show');
    refreshCtx();

    // Show resize handles for any element (not body/html)
    clearResizeHandles();
    if (!PROTECTED.has(el.tagName)) showResizeHandles(el);
  }

  function deselect() {
    if (editingText) exitTextEdit();
    if (selectedElement) clearSelectionStyle(selectedElement);
    clearResizeHandles();
    selectedElement = null;
    ctxTools.classList.remove('show');
    fontSizeDisplay.textContent = '--';
  }

  function refreshCtx() {
    if (!selectedElement) return;
    fontSizeDisplay.textContent = isSvg(selectedElement) ? '--' : getFontSize(selectedElement);
  }

  // ========== Inline text editing ==========
  var textEditCmd = null;

  function enterTextEdit(el) {
    if (isSvg(el) || PROTECTED.has(el.tagName)) return;
    if (editingText && selectedElement === el) return;
    selectEl(el);
    editingText = true;
    textEditCmd = cmdSnapshot(el);
    el.setAttribute('contenteditable', 'true');
    el.focus();
    // Place cursor at click position - browser handles this from the event
  }

  function exitTextEdit() {
    if (!editingText || !selectedElement) { editingText = false; return; }
    selectedElement.removeAttribute('contenteditable');
    if (textEditCmd) {
      textEditCmd.seal();
      if (textEditCmd._new !== null && textEditCmd._new !== selectedElement.innerHTML) {
        // innerHTML already matches _new (user typed), so we store the command
        undoStack.push(textEditCmd);
        redoStack.length = 0;
        updateUndoRedo();
      }
      textEditCmd = null;
    }
    editingText = false;
  }

  // ========== Color apply ==========
  function applyColor(color) {
    if (!selectedElement) return;

    // If editing text with selection, apply to selection only
    if (editingText) {
      var sel = getDoc().getSelection();
      if (sel && !sel.isCollapsed) {
        getDoc().execCommand('foreColor', false, color);
        return;
      }
    }

    // Otherwise apply to whole element
    var el = selectedElement;
    if (isSvg(el)) {
      var old = el.getAttribute('fill') || '';
      exec(cmdColor(el, 'fill', old, color));
    } else {
      var oldC = el.style.color || '';
      exec(cmdColor(el, 'color', oldC, color));
    }
  }

  // ========== Font size ==========
  function changeFontSize(delta) {
    if (!selectedElement || isSvg(selectedElement)) return;
    var el = selectedElement;
    var cur = getFontSize(el);
    var nv = Math.max(8, Math.min(200, cur + delta));
    if (nv === cur) return;
    exec(cmdFontSize(el, el.style.fontSize || '', nv));
    fontSizeDisplay.textContent = nv;
  }

  // ========== Delete / Copy ==========
  function deleteSelected() {
    if (!selectedElement || PROTECTED.has(selectedElement.tagName)) return;
    var el = selectedElement;
    clearResizeHandles();
    exec(cmdDelete(el));
    deselect();
  }

  function copySelected() {
    if (!selectedElement || PROTECTED.has(selectedElement.tagName)) return;
    exec(cmdCopy(selectedElement));
  }

  // ========== Element Resize (8 handles) ==========
  var resizeHandles = [];
  var resizing = false;

  function clearResizeHandles() {
    resizeHandles.forEach(function(h) { if (h.parentNode) h.parentNode.removeChild(h); });
    resizeHandles = [];
  }

  // Handle positions: [name, xFactor, yFactor]
  var HANDLE_POS = [
    ['nw', 0, 0], ['n', 0.5, 0], ['ne', 1, 0],
    ['w', 0, 0.5],                ['e', 1, 0.5],
    ['sw', 0, 1], ['s', 0.5, 1], ['se', 1, 1]
  ];

  function positionHandles(el) {
    var rect = el.getBoundingClientRect();
    var ir = iframe.getBoundingClientRect();
    resizeHandles.forEach(function(h, i) {
      var pos = HANDLE_POS[i];
      h.style.left = (ir.left + rect.left + rect.width * pos[1] - 4) + 'px';
      h.style.top = (ir.top + rect.top + rect.height * pos[2] - 4) + 'px';
    });
  }

  function showResizeHandles(el) {
    var svgEl = isSvg(el);
    var tag = el.tagName.toLowerCase();

    HANDLE_POS.forEach(function(pos) {
      var h = document.createElement('div');
      h.className = 'resize-handle ' + pos[0];
      document.body.appendChild(h);
      resizeHandles.push(h);

      h.addEventListener('mousedown', function(e) {
        e.preventDefault(); e.stopPropagation();
        resizing = true;
        var startX = e.clientX, startY = e.clientY;
        var startRect = el.getBoundingClientRect();
        var dir = pos[0];

        // Save old values
        var oldStyleW = el.style.width || '', oldStyleH = el.style.height || '';
        var oldStyleML = el.style.marginLeft || '', oldStyleMT = el.style.marginTop || '';
        var origW = startRect.width, origH = startRect.height;

        // SVG old values
        var oldSvgW, oldSvgH;
        if (svgEl) {
          if (tag === 'circle') { oldSvgW = parseFloat(el.getAttribute('r')) || 50; }
          else if (tag === 'ellipse') { oldSvgW = parseFloat(el.getAttribute('rx')) || 50; oldSvgH = parseFloat(el.getAttribute('ry')) || 50; }
          else { oldSvgW = parseFloat(el.getAttribute('width')) || origW; oldSvgH = parseFloat(el.getAttribute('height')) || origH; }
        }

        function onMove(ev) {
          var dx = ev.clientX - startX, dy = ev.clientY - startY;
          // Determine which axes to resize based on handle direction
          var resizeL = dir.indexOf('w') >= 0;
          var resizeR = dir.indexOf('e') >= 0;
          var resizeT = dir.indexOf('n') >= 0;
          var resizeB = dir.indexOf('s') >= 0;

          var newW = origW, newH = origH;
          if (resizeR) newW = origW + dx;
          if (resizeL) newW = origW - dx;
          if (resizeB) newH = origH + dy;
          if (resizeT) newH = origH - dy;
          newW = Math.max(20, newW);
          newH = Math.max(20, newH);

          if (svgEl) {
            if (tag === 'circle') {
              var delta = resizeR || resizeB ? Math.max(dx, dy) : -Math.max(-dx, -dy);
              el.setAttribute('r', Math.max(5, oldSvgW + delta / 2));
            } else if (tag === 'ellipse') {
              var ddx = resizeR ? dx : (resizeL ? -dx : 0);
              var ddy = resizeB ? dy : (resizeT ? -dy : 0);
              el.setAttribute('rx', Math.max(5, oldSvgW + ddx / 2));
              el.setAttribute('ry', Math.max(5, (oldSvgH || oldSvgW) + ddy / 2));
            } else {
              el.setAttribute('width', Math.max(10, resizeR ? oldSvgW + dx : oldSvgW - dx));
              el.setAttribute('height', Math.max(10, resizeB ? oldSvgH + dy : oldSvgH - dy));
            }
          } else {
            el.style.width = newW + 'px';
            el.style.height = newH + 'px';
            // Shift position for top/left handles
            if (resizeL) el.style.marginLeft = (parseFloat(oldStyleML) || 0) + (origW - newW) + 'px';
            if (resizeT) el.style.marginTop = (parseFloat(oldStyleMT) || 0) + (origH - newH) + 'px';
          }
          positionHandles(el);
          applySelectionStyle(el);
        }

        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          resizing = false;
          // Build undo
          if (svgEl) {
            if (tag === 'circle') { var nr = parseFloat(el.getAttribute('r')); if (nr !== oldSvgW) exec(cmdResize(el, 'r', oldSvgW, nr)); }
            else if (tag === 'ellipse') {
              var nrx = parseFloat(el.getAttribute('rx')), nry = parseFloat(el.getAttribute('ry'));
              if (nrx !== oldSvgW) exec(cmdResize(el, 'rx', oldSvgW, nrx));
              if (nry !== (oldSvgH || oldSvgW)) exec(cmdResize(el, 'ry', oldSvgH || oldSvgW, nry));
            } else {
              var nw2 = parseFloat(el.getAttribute('width')), nh2 = parseFloat(el.getAttribute('height'));
              if (nw2 !== oldSvgW) exec(cmdResize(el, 'width', oldSvgW, nw2));
              if (nh2 !== oldSvgH) exec(cmdResize(el, 'height', oldSvgH, nh2));
            }
          } else {
            var fW = el.style.width, fH = el.style.height;
            var fML = el.style.marginLeft, fMT = el.style.marginTop;
            if (fW !== oldStyleW || fH !== oldStyleH || fML !== oldStyleML || fMT !== oldStyleMT) {
              exec({
                execute: function() { el.style.width = fW; el.style.height = fH; el.style.marginLeft = fML; el.style.marginTop = fMT; },
                undo: function() { el.style.width = oldStyleW; el.style.height = oldStyleH; el.style.marginLeft = oldStyleML; el.style.marginTop = oldStyleMT; }
              });
            }
          }
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
    positionHandles(el);
  }

  // ========== Drag to reorder ==========
  var dragEl = null, dropIndicator = null;

  function setupElement(el) {
    if (el.nodeType !== 1 || PROTECTED.has(el.tagName)) return;
    el.setAttribute('draggable', 'true');
    for (var i = 0; i < el.children.length; i++) setupElement(el.children[i]);
  }

  function setupDragDrop(doc) {
    dropIndicator = doc.createElement('div');
    dropIndicator.style.cssText = 'position:absolute;left:0;right:0;height:3px;border-radius:2px;pointer-events:none;z-index:99999;display:none;background:' +
      getComputedStyle(document.documentElement).getPropertyValue('--drop-line').trim() + ';';
    doc.body.appendChild(dropIndicator);

    doc.addEventListener('dragstart', function(e) {
      if (PROTECTED.has(e.target.tagName) || editingText) { e.preventDefault(); return; }
      dragEl = e.target; e.target.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    doc.addEventListener('dragover', function(e) {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      if (!dragEl) return;
      var t = e.target;
      if (t === dragEl || PROTECTED.has(t.tagName) || t === dropIndicator) return;
      if (dragEl.parentNode && t.parentNode === dragEl.parentNode) {
        var r = t.getBoundingClientRect();
        var mid = r.top + r.height / 2;
        dropIndicator.style.top = (e.clientY < mid ? r.top : r.bottom) + doc.documentElement.scrollTop - 1 + 'px';
        dropIndicator.style.left = r.left + 'px';
        dropIndicator.style.width = r.width + 'px';
        dropIndicator.style.display = 'block';
        dropIndicator._ref = e.clientY < mid ? t : t.nextSibling;
      }
    });
    doc.addEventListener('drop', function(e) {
      e.preventDefault(); dropIndicator.style.display = 'none';
      if (!dragEl) return;
      var oldP = dragEl.parentNode, oldN = dragEl.nextSibling, newN = dropIndicator._ref;
      if (oldN !== newN && dragEl !== newN) exec(cmdMove(dragEl, oldP, oldN, oldP, newN));
      dragEl.style.opacity = ''; dragEl = null;
    });
    doc.addEventListener('dragend', function() {
      dropIndicator.style.display = 'none';
      if (dragEl) { dragEl.style.opacity = ''; dragEl = null; }
    });
  }

  // ========== Inject iframe styles ==========
  function injectIframeStyles(doc) {
    var style = doc.createElement('style');
    style.setAttribute('data-chisel', 'true');
    style.textContent =
      '*:not(html):not(head):not(body):not(script):not(style):not(link):not(meta) { cursor: pointer !important; transition: outline 0.15s; }' +
      '[contenteditable="true"] { cursor: text !important; outline: 2px solid rgba(0,51,255,0.4) !important; outline-offset: 3px; }';
    doc.head.appendChild(style);
  }

  // ========== File I/O ==========
  function openFile(file) {
    var reader = new FileReader();
    reader.onload = function(e) { loadHTML(e.target.result); };
    reader.readAsText(file);
  }

  function loadHTML(html) {
    var doc = getDoc();
    doc.open(); doc.write(html); doc.close();
    assignIds(doc.documentElement);
    injectIframeStyles(doc);
    for (var i = 0; i < doc.body.children.length; i++) setupElement(doc.body.children[i]);
    setupIframeListeners(doc);
    setupDragDrop(doc);
    fileLoaded = true;
    emptyState.classList.add('hidden');
    toolbar.classList.remove('hidden');
    undoStack.length = 0; redoStack.length = 0; updateUndoRedo();
    deselect();
    showTooltip(T[lang].hintSelect, 3500);
  }

  function saveFile() {
    if (!fileLoaded) return;
    var clone = getDoc().documentElement.cloneNode(true);
    // Strip editor artifacts
    clone.querySelectorAll('[data-eid]').forEach(function(el) { el.removeAttribute('data-eid'); });
    clone.querySelectorAll('[draggable]').forEach(function(el) { el.removeAttribute('draggable'); });
    clone.querySelectorAll('[contenteditable]').forEach(function(el) { el.removeAttribute('contenteditable'); });
    clone.querySelectorAll('style[data-chisel]').forEach(function(el) { el.remove(); });
    clone.querySelectorAll('div[style*="z-index:99999"]').forEach(function(el) { el.remove(); });
    clone.querySelectorAll('[style]').forEach(function(el) {
      el.style.removeProperty('outline'); el.style.removeProperty('outline-offset');
      el.style.removeProperty('border-radius'); el.style.removeProperty('opacity');
      if (!el.getAttribute('style')) el.removeAttribute('style');
    });
    var blob = new Blob(['<!DOCTYPE html>\n' + clone.outerHTML], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'edited.html'; a.click();
    URL.revokeObjectURL(a.href);
  }

  function exportPDF() {
    if (!fileLoaded) return;
    var doc = getDoc();
    // Inject print styles to ensure full content prints
    var printStyle = doc.createElement('style');
    printStyle.setAttribute('data-chisel-print', 'true');
    printStyle.textContent = '@media print { html, body { height: auto !important; overflow: visible !important; } }';
    doc.head.appendChild(printStyle);
    // Temporarily expand iframe to full content height
    var body = doc.body;
    var fullH = body.scrollHeight;
    iframe.style.height = fullH + 'px';
    getWin().focus();
    getWin().print();
    // Restore after print dialog closes
    setTimeout(function() {
      iframe.style.height = '100%';
      var ps = doc.querySelector('style[data-chisel-print]');
      if (ps) ps.remove();
    }, 1000);
  }

  // ========== Iframe listeners ==========
  function setupIframeListeners(doc) {
    // Single click — select, and enter text edit for non-SVG
    doc.addEventListener('click', function(e) {
      e.preventDefault(); e.stopPropagation();
      var t = e.target;
      if (t === doc.documentElement || t === doc.body) { deselect(); return; }
      if (PROTECTED.has(t.tagName)) return;

      // If already editing this element, let the cursor work naturally
      if (editingText && t === selectedElement) return;
      if (editingText && selectedElement && selectedElement.contains(t)) return;

      // For non-SVG: single click enters text edit directly
      if (!isSvg(t)) {
        enterTextEdit(t);
      } else {
        selectEl(t);
      }
    }, true);

    // Track scroll for resize handles
    doc.addEventListener('scroll', function() {
      if (selectedElement && !PROTECTED.has(selectedElement.tagName)) {
        if (resizeHandles.length) positionHandles(selectedElement); else showResizeHandles(selectedElement);
      }
    });
  }

  // ========== Tooltip ==========
  function showTooltip(msg, dur) {
    tooltipEl.textContent = msg;
    tooltipEl.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);';
    tooltipEl.classList.add('visible');
    setTimeout(function() { tooltipEl.classList.remove('visible'); }, dur || 3000);
  }

  // ========== Event bindings ==========
  document.getElementById('btn-empty-open').addEventListener('click', function() { fileInput.click(); });
  document.getElementById('btn-open').addEventListener('click', function() { fileInput.click(); });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length) { openFile(fileInput.files[0]); fileInput.value = ''; }
  });
  document.getElementById('btn-save').addEventListener('click', saveFile);
  document.getElementById('btn-pdf').addEventListener('click', exportPDF);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);

  // Colors
  document.querySelectorAll('.bb-color').forEach(function(el) {
    el.addEventListener('click', function() { applyColor(el.getAttribute('data-color')); });
  });

  // Font size
  document.getElementById('btn-font-up').addEventListener('click', function() { changeFontSize(2); });
  document.getElementById('btn-font-down').addEventListener('click', function() { changeFontSize(-2); });

  // Copy / Delete
  document.getElementById('btn-copy').addEventListener('click', copySelected);
  document.getElementById('btn-delete').addEventListener('click', deleteSelected);

  // Theme / Lang
  document.getElementById('btn-theme').addEventListener('click', function() { setTheme(theme === 'light' ? 'dark' : 'light'); });
  document.getElementById('btn-lang').addEventListener('click', function() { setLang(lang === 'en' ? 'zh' : 'en'); });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    var mod = navigator.platform.toUpperCase().indexOf('MAC') >= 0 ? e.metaKey : e.ctrlKey;
    if (mod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    else if (mod && e.key === 'Z' && e.shiftKey) { e.preventDefault(); redo(); }
    else if (mod && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); copySelected(); }
    else if (mod && (e.key === 's' || e.key === 'S')) { e.preventDefault(); saveFile(); }
    else if ((e.key === 'Delete' || e.key === 'Backspace') && !editingText && selectedElement) { e.preventDefault(); deleteSelected(); }
    else if (e.key === 'Escape') { if (editingText) exitTextEdit(); else deselect(); }
  });

  // File drop
  document.getElementById('canvas-area').addEventListener('dragover', function(e) { e.preventDefault(); });
  document.getElementById('canvas-area').addEventListener('drop', function(e) {
    e.preventDefault();
    if (e.dataTransfer.files.length && e.dataTransfer.files[0].name.match(/\.html?$/i))
      openFile(e.dataTransfer.files[0]);
  });

  // Window resize — update resize handles
  window.addEventListener('resize', function() {
    if (selectedElement && !PROTECTED.has(selectedElement.tagName)) {
      if (resizeHandles.length) positionHandles(selectedElement); else showResizeHandles(selectedElement);
    }
  });

  // ========== Toolbar layout toggle ==========
  var barMode = localStorage.getItem('chisel-bar-mode') || 'bottom';

  function setBarMode(mode) {
    barMode = mode;
    localStorage.setItem('chisel-bar-mode', mode);
    toolbar.classList.remove('mode-bottom', 'mode-left');
    toolbar.classList.add('mode-' + mode);
    // Update icon
    var icon = document.getElementById('layout-icon');
    if (mode === 'left') {
      // Show "go to bottom" icon
      icon.innerHTML = '<rect x="3" y="17" width="18" height="4" rx="1"/><rect x="3" y="3" width="4" height="10" rx="1"/>';
    } else {
      // Show "go to left" icon
      icon.innerHTML = '<rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/>';
    }
  }

  document.getElementById('btn-layout').addEventListener('click', function() {
    setBarMode(barMode === 'bottom' ? 'left' : 'bottom');
  });

  setBarMode(barMode);

  // ========== Init ==========
  setTheme(theme); setLang(lang);
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
